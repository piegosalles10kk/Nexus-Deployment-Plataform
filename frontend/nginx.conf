server {
    listen 8000;
    server_name localhost;

    # ── Gateway Routes (auto-generated by Nexus backend) ─────────────────────
    # This file is written to /etc/nginx/nexus-gateway/gateway.conf by the backend
    # whenever a gateway route is created, updated, or deleted.
    include /etc/nginx/nexus-gateway/gateway.conf;

    # ── Agent installation files ──────────────────────────────────────────────
    location /install.sh {
        proxy_pass http://10kk-backend:4500;
        proxy_set_header Host $host;
    }

    location /install.ps1 {
        proxy_pass http://10kk-backend:4500;
        proxy_set_header Host $host;
    }

    location /downloads {
        proxy_pass http://10kk-backend:4500;
        proxy_set_header Host $host;
    }

    # ── API (Backend) ─────────────────────────────────────────────────────────
    location /api {
        proxy_pass http://10kk-backend:4500;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Webhooks ──────────────────────────────────────────────────────────────
    location /webhook {
        proxy_pass http://10kk-backend:4500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Agent mTLS WebSocket ──────────────────────────────────────────────────
    location /ws/agent {
        proxy_pass https://10kk-backend:4501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── WebSocket (Socket.io) ─────────────────────────────────────────────────
    location /socket.io {
        proxy_pass http://10kk-backend:4500;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── React App (SPA fallback) ──────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ── Error handling ────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
